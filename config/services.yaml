# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    uploads_directory: '%kernel.project_dir%/public/medias'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_public_key: '%env(STRIPE_PUBLIC_KEY)%'
    stripe_webhook_secret: '%env(STRIPE_WEBHOOK_SECRET)%'
    env(SITE_URL): ''
    app.site_url: '%env(SITE_URL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\FormationApercuStorage:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $uploadsDirectory: '%uploads_directory%'

    App\Service\AttestationPdfGenerator:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\PromoVideoDisplayHelper:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Command\TestAttestationPdfCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\MailerConfig:
        arguments:
            $mailerDsn: '%env(MAILER_DSN)%'
            $mailerFrom: '%env(MAILER_FROM)%'
            $mailerFromName: '%env(MAILER_FROM_NAME)%'

    App\Service\StripePaymentService:
        arguments:
            $stripeSecretKey: '%stripe_secret_key%'
            $stripeWebhookSecret: '%stripe_webhook_secret%'

    App\Service\StripePromoCodeSyncService:
        arguments:
            $stripeSecretKey: '%stripe_secret_key%'

    App\Twig\SeoExtension:
        arguments:
            $siteUrl: '%app.site_url%'

    App\Security\EmailVerifier:
        arguments:
            $projectDir: '%kernel.project_dir%'
